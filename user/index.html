<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>FAMILIADA ZSK - WIDOK WIDZA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body onclick="this.querySelector('#unlock-msg').style.display='none'">
    <div id="unlock-msg" style="position:fixed; top:0; left:0; width:100%; height:100%; display: none; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center; color:white; font-family:sans-serif; cursor:pointer;">
        <h1>KLIKNIJ GDZIEKOLWIEK, ABY ZACZĄĆ</h1>
    </div>

    <div id="blackout"></div>

    <div id="intro-screen">
        <div class="pixel-grid" id="pixel-canvas"></div>
    </div>

    <div id="game-screen">
        <div id="narada-box"></div>
        <div class="pot-area">
            <div class="pot-label">SUMA</div>
            <div class="score-val" id="pot">000</div>
        </div>
        <div id="question-display"></div>
        
        <div id="game-content">
            <div class="side-area">
                <div class="team-box" id="box-left">
                    <h2 id="n1">LEWA</h2>
                    <div class="score-val" id="s1">000</div>
                </div>
                <div class="strikes" id="str1"></div>
            </div>

            <div class="main-board" id="ans-grid"></div>

            <div class="side-area">
                <div class="team-box" id="box-right">
                    <h2 id="n2">PRAWA</h2>
                    <div class="score-val" id="s2">000</div>
                </div>
                <div class="strikes" id="str2"></div>
            </div>
        </div>
    </div>

    <div id="win-screen">
        <div class="win-card">
            <h1>WYGRYWA:</h1>
            <div id="win-team-name">-</div>
            <div id="win-points">0 : 0</div>
            <h2 style="color: white; margin-top: 30px;">GRATULACJE!</h2>
        </div>
    </div>

    <audio id="snd-intro" src="intro.mp3" loop></audio>
    <audio id="snd-correct" src="correct.mp3"></audio>
    <audio id="snd-wrong" src="wrong.mp3"></audio>
    <audio id="snd-win" src="win.mp3"></audio>

    <script src="logic.js"></script>
</body>
</html>
