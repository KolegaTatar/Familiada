<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>REŻYSERKA FAMILIADA ZSK - FINAL PRO</title>
    <script src="../ogolne.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #1a1a1a; --card-bg: #333; --red: #ff4444; --blue: #008cba; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; padding-bottom: 140px; }
        .container { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1200px; margin: 0 auto; }
        .col { flex: 1; min-width: 320px; }
        .card { background: var(--card-bg); border-radius: 10px; border-left: 5px solid var(--gold); margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card-header { background: rgba(255,255,255,0.05); padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; }
        .card-header:hover { background: rgba(255,255,255,0.1); }
        .card-content { padding: 15px; }
        .collapsed .card-content { display: none; }
        
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; background: var(--gold); margin: 3px; transition: all 0.2s; color: #000; }
        button:hover { transform: scale(1.01); filter: brightness(1.01); }
        
        .red { background: var(--red); color: white; }
        .blue { background: var(--blue); color: white; }
        .green { background: var(--green); color: white; }
        .gray { background: #555; color: white; }
        
        .btn-on { background: #fff !important; color: #000 !important; box-shadow: 0 0 10px #fff; transform: scale(1.05); }
        .active-1 { background: var(--red) !important; box-shadow: 0 0 15px var(--red); color: white !important; }
        .active-2 { background: var(--blue) !important; box-shadow: 0 0 15px var(--blue); color: white !important; }
        .save-success { background: var(--green) !important; color: white !important; }

        input[type="text"], input[type="number"] { padding: 10px; border-radius: 5px; width: 90%; margin-bottom: 10px; background: #444; color: white; border: 1px solid #555; }
        #status-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px; border-top: 3px solid var(--gold); display: flex; justify-content: space-around; font-weight: bold; z-index: 1000; }
        .stat-val { color: var(--gold); }
        .audio-controls { background: #222; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #444; }
        .mute-active { background: var(--red) !important; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="col">
            <div class="card" style="border-left-color: var(--green)">
                <div class="card-header" onclick="toggleCard(this)">KONTROLA EKRANU / START</div>
                <div class="card-content">
                    <button onclick="startGame()" class="green" style="width: 100%; margin-bottom: 10px;">🚀 ROZPOCZNIJ GRĘ</button>
                    <button id="btn-logo" onclick="toggleIntro()" class="gray">LOGO ON/OFF</button>
                    <button id="btn-question" onclick="toggleQuestion()" class="blue">PYTANIE ON/OFF</button>
                    
                    <div id="narada-settings" style="margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; border: 2px solid transparent; transition: 0.3s;">
                        <input type="checkbox" id="chk-narada" onchange="updateNaradaVisibility()" style="width: auto; margin-right: 10px; cursor: pointer;">
                        <label for="chk-narada" style="cursor: pointer; font-weight: bold; font-size: 13px;">Włącz napisy narady (u widza)</label>
                    </div>
                    <hr>
                    <button id="b1" onclick="setActive(1)">LEWA (Pojedynek)</button>
                    <button id="b2" onclick="setActive(2)">PRAWA (Pojedynek)</button>
                </div>
            </div>

            <div class="card" style="border-left-color: #ff00ff">
                <div class="card-header" onclick="toggleCard(this)">USTAWIENIA DŹWIĘKU & EFEKTY</div>
                <div class="card-content">
                    <button id="btn-mute" onclick="toggleMasterMute()" class="gray" style="width: 100%; margin-bottom: 10px;">🔊 DŹWIĘKI: WŁĄCZONE</button>
                    <div class="audio-controls">
                        <span style="font-size: 11px;">GŁOŚNOŚĆ:</span>
                        <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume(this.value)" style="width: 100%;">
                    </div>
                    <p style="font-size: 11px; color: #aaa; margin: 10px 0 5px 0;">Ręczne wyzwalanie (U WIDZA):</p>
                    <div style="display: flex; gap: 5px;">
                        <button onclick="playSound('correct')" class="green" style="flex: 1; font-size: 11px;">✅ DOBRA</button>
                        <button onclick="playSound('wrong')" class="red" style="flex: 1; font-size: 11px;">❌ BŁĄD</button>
                        <button onclick="playSound('win')" class="blue" style="flex: 1; font-size: 11px;">🏆 WIN</button>
                    </div>
                    <button onclick="stopAllSounds()" class="gray" style="width: 100%; margin-top: 10px; font-size: 10px; background: #222;">⏹ STOP</button>
                </div>
            </div>

            <div class="card"> 
                <div class="card-header" onclick="toggleCard(this)">USTAWIENIA DRUŻYN</div>
                <div class="card-content">
                    <input type="number" id="in-limit" value="300">
                    <input type="text" id="in-n1" placeholder="Nazwa Lewej">
                    <input type="text" id="in-n2" placeholder="Nazwa Prawej">
                    <button id="btn-save" onclick="submitSettings()" class="green" style="width: 100%">ZATWIERDŹ</button>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card">
                <div class="card-header" onclick="toggleCard(this)">ODPOWIEDZI</div>
                <div class="card-content">
                    <input type="text" id="ans_in" placeholder="Wpisz hasło..." autocomplete="off">
                    <button onclick="check()" class="green">OK</button>
                    <button class="red" onclick="handleError()" style="width: 100%; margin-top:10px;">BŁĄD (X)</button>
                    <button onclick="revealAllRemaining()" class="gray" style="width: 100%; margin-top:5px; background: #666;">🔓 ODKRYJ POZOSTAŁE</button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header" onclick="toggleCard(this)">WYBÓR RUNDY</div>
                <div class="card-content" id="rounds-list"></div>
            </div>
            
            <div class="card">
                <div class="card-header" onclick="toggleCard(this)">PUNKTY / KONIEC</div>
                <div class="card-content">
                    <button onclick="assign(1)" style="width: 47%">DLA LEWEJ</button>
                    <button onclick="assign(2)" style="width: 47%">DLA PRAWEJ</button>
                    <hr>
                    <button onclick="forceWin()" class="green" style="width: 100%">OGŁOŚ ZWYCIĘSTWO</button>
                    <button onclick="fullRestart()" class="red" style="width: 100%; margin-top: 10px;">RESTART SYSTEMU</button>
                </div>
            </div>
        </div>
    </div>

    <div id="status-bar">
        <div>AKTYWNA: <span id="st-act" class="stat-val">-</span></div>
        <div>MNOŻNIK: <span id="st-mult" class="stat-val">x1</span></div>
        <div>SUMA: <span id="st-pot" class="stat-val">0</span></div>
        <div>NARADA: <span id="st-nar" class="stat-val">WYŁ.</span></div>
        <div>IKSY: <span id="st-strikes" class="stat-val">0:0</span></div>
    </div>

    <div id="restart-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; align-items:center; justify-content:center;">
        <div style="background:#222; border: 3px solid var(--gold); padding: 30px; border-radius: 15px; text-align:center; max-width:400px;">
            <h2 style="color:var(--gold); margin-top:0;">⚠️ RESTART</h2>
            <p>Czy na pewno chcesz wyczyścić grę i wrócić do logo?</p>
            <div style="margin-top:25px; display:flex; gap:10px; justify-content:center;">
                <button onclick="confirmFullRestart()" class="red">TAK, RESETUJ</button>
                <button onclick="closeRestartModal()" class="gray">ANULUJ</button>
            </div>
        </div>
    </div>

    <script>
     let state = JSON.parse(localStorage.getItem('familiada_state')) || getInit();

    function getInit() { 
        return { 
            showIntro: true, 
            showQuestion: false, 
            activeTeam: 0, 
            duelPhase: true, 
            showNarada: false, 
            isGameOver: false, 
            winner: null, 
            name1: "LEWA", 
            name2: "PRAWA", 
            score1: 0, 
            score2: 0, 
            pot: 0, 
            strikes1: 0, 
            strikes2: 0, 
            answers: [], 
            currentQuestion: "", 
            multiplier: 1, 
            transitioning: false, 
            lastSound: {id: null, time: 0},
            isMuted: false // Nowe pole w stanie
        }; 
    }

    function sync() { 
        localStorage.setItem('familiada_state', JSON.stringify(state)); 
        render(); 
    }

    function playSound(id) {
        // Jeśli admin wyciszył, nie wysyłamy sygnału o nowym dźwięku
        if(state.isMuted) return;
        
        state.lastSound = {
            id: id,
            time: Date.now()
        };
        sync();
    }

    function toggleMasterMute() {
        state.isMuted = !state.isMuted; // Zmieniamy w stanie, by Widz widział
        const btn = document.getElementById('btn-mute');
        btn.innerText = state.isMuted ? "🔇 WYCISZONE" : "🔊 WŁĄCZONE";
        btn.className = state.isMuted ? "mute-active" : "gray";
        sync();
    }

    function stopAllSounds() {
        state.lastSound = { id: 'stop', time: Date.now() };
        sync();
    }

    function updateVolume(v) { 
        // Opcjonalnie: state.volume = v; sync();
    }

    function render() {
        const b1 = document.getElementById('b1');
        const b2 = document.getElementById('b2');
        if(b1) b1.className = state.activeTeam === 1 ? "active-1" : "gray";
        if(b2) b2.className = state.activeTeam === 2 ? "active-2" : "gray";
        
        const bl = document.getElementById('btn-logo');
        const bq = document.getElementById('btn-question');
        if(bl) bl.className = state.showIntro ? "btn-on" : "gray";
        if(bq) bq.className = state.showQuestion ? "btn-on" : "blue";
        
        // Render przycisku mute na podstawie stanu (ważne po odświeżeniu)
        const btnMute = document.getElementById('btn-mute');
        if(btnMute) {
            btnMute.innerText = state.isMuted ? "🔇 WYCISZONE" : "🔊 WŁĄCZONE";
            btnMute.className = state.isMuted ? "mute-active" : "gray";
        }

        document.getElementById('st-act').innerText = state.activeTeam === 0 ? "BRAK" : (state.activeTeam === 1 ? state.name1 : state.name2);
        document.getElementById('st-pot').innerText = state.pot;
        document.getElementById('st-mult').innerText = `x${state.multiplier || 1}`;
        document.getElementById('st-strikes').innerText = `${state.strikes1}:${state.strikes2}`;
        document.getElementById('chk-narada').checked = state.showNarada;
    }

    function confirmFullRestart() {
        localStorage.clear();
        state = getInit();
        localStorage.setItem('familiada_state', JSON.stringify(state));
        location.reload();
    }

        function startGame() { 
            state.showIntro = false; 
            state.isGameOver = false; 
            state.duelPhase = true; 
            if (!state.currentQuestion) setRound(0); 
            sync(); 
        }

        function setRound(idx) {
            state.transitioning = true; 
            sync();
            setTimeout(() => {
                if(typeof roundsData !== 'undefined' && roundsData[idx]) {
                    const r = roundsData[idx];
                    state.answers = r.odpowiedzi.map(a => ({...a, revealed: false}));
                    state.currentQuestion = r.pytanie; 
                    state.multiplier = r.multiplier;
                }
                state.activeTeam = 0; 
                state.duelPhase = true; 
                state.strikes1 = 0; 
                state.strikes2 = 0; 
                state.pot = 0;
                state.showIntro = false; 
                state.isGameOver = false;
                state.transitioning = false;
                sync();
            }, 300);
        }

        function check() {
            const v = document.getElementById('ans_in').value.trim().toUpperCase();
            if(!v || state.activeTeam === 0) return;
            let f = false; 
            state.answers.forEach(a => { 
                if(a.text.toUpperCase() === v && !a.revealed) { 
                    a.revealed = true; 
                    state.pot += (a.points * state.multiplier); 
                    f = true; 
                } 
            });
            if(f) { 
                playSound('correct'); 
                if(state.answers.every(a => a.revealed)) assign(state.activeTeam); 
            } 
            else handleError();
            document.getElementById('ans_in').value = ''; 
            sync();
        }

        function handleError() {
            if(state.activeTeam === 0) return;
            playSound('wrong');
            if(state.duelPhase) {
                if(state.activeTeam === 1) { state.strikes1 = 1; state.activeTeam = 2; }
                else { state.strikes2 = 1; state.activeTeam = 1; }
                state.duelPhase = false;
            } else {
                if(state.activeTeam === 1) { 
                    state.strikes1++; 
                    if(state.strikes1 >= 3) state.activeTeam = 2; 
                }
                else { 
                    state.strikes2++; 
                    if(state.strikes2 >= 3) state.activeTeam = 1; 
                }
            }
            sync();
        }

        function revealAllRemaining() {
            state.answers.forEach(ans => ans.revealed = true);
            sync();
        }

        function assign(n) { 
            if(n === 1) state.score1 += state.pot; else state.score2 += state.pot; 
            state.pot = 0; state.strikes1 = 0; state.strikes2 = 0; state.activeTeam = 0; state.duelPhase = true; 
            sync(); 
        }

        function submitSettings() {
            state.name1 = document.getElementById('in-n1').value || "LEWA";
            state.name2 = document.getElementById('in-n2').value || "PRAWA";
            const btn = document.getElementById('btn-save');
            btn.innerText = "✅ ZAPISANO!";
            btn.classList.add('save-success');
            setTimeout(() => { btn.innerText = "ZATWIERDŹ"; btn.classList.remove('save-success'); }, 1000);
            sync();
        }

        function forceWin() { 
            state.winner = state.score1 > state.score2 ? state.name1 : state.name2;
            state.isGameOver = true; 
            playSound('win'); 
            sync(); 
        }

        function fullRestart() { document.getElementById('restart-modal').style.display = 'flex'; }
        function closeRestartModal() { document.getElementById('restart-modal').style.display = 'none'; }
        
        function confirmFullRestart() {
            // 1. Czyścimy całkowicie pamięć przeglądarki
            localStorage.clear();

            // 2. Pobieramy świeży, bazowy stan (ten z showIntro: true)
            state = getInit();

            // 3. Wysyłamy go do bazy, aby Widz (TV) natychmiast zareagował
            localStorage.setItem('familiada_state', JSON.stringify(state));

            // 4. Zamykamy okno modala
            closeRestartModal();

            // 5. Odświeżamy admina po krótkiej chwili, by wszystko wskoczyło na nowo
            document.body.style.opacity = '0.5';
            setTimeout(() => {
                window.location.reload();
            }, 150);
        }

        function setActive(n) { state.activeTeam = n; sync(); }
        function toggleIntro() { state.showIntro = !state.showIntro; sync(); }
        function toggleQuestion() { state.showQuestion = !state.showQuestion; sync(); }

        window.onload = () => {
            if(typeof roundsData !== 'undefined') {
                const list = document.getElementById('rounds-list');
                roundsData.forEach((r, i) => {
                    const b = document.createElement('button');
                    b.innerText = `R${i+1} (x${r.multiplier})`;
                    b.onclick = () => setRound(i);
                    list.appendChild(b);
                });
            }
            document.getElementById('in-n1').value = state.name1;
            document.getElementById('in-n2').value = state.name2;
            render();
        };

        document.getElementById('ans_in').onkeypress = (e) => { if(e.key === 'Enter') check(); };
    </script>
</body>
</html>
